<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Swipe Toolkit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- ───────── Login Screen ───────── -->
<div id="login-screen" class="screen">
  <div class="login-container">
    <div class="login-logo">S</div>
    <h1 class="login-title">Swipe Toolkit</h1>
    <p class="login-subtitle">Sign in to continue</p>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
      <p id="login-error" class="error-text"></p>
    </form>
    <div class="login-server">
    </div>
  </div>
</div>

<!-- ───────── Main App ───────── -->
<div id="app-screen" class="screen hidden">

  <!-- ── Tab 1: Swipe Storage ── -->
  <section id="tab-swipe" class="tab-panel active">
    <div class="tab-header">
      <span class="tab-header-title">Snippets</span>
      <span class="tab-stat" id="stat-swipe" title="Snippets copied/inserted today">0</span>
    </div>
    <div class="swipe-toolbar">
      <input type="text" id="swipe-search" placeholder="Search snippets..." class="input-search">
      <button class="btn btn-sm btn-primary" id="btn-new-snippet" title="New snippet">+ New</button>
    </div>
    <div class="swipe-layout">
      <aside class="swipe-sidebar" id="folder-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Folders</span>
          <button class="btn-icon" id="btn-new-folder" title="New folder">+</button>
        </div>
        <ul id="folder-tree" class="folder-tree"></ul>
      </aside>
      <div class="swipe-main">
        <div class="tag-filter" id="tag-filter-bar"></div>
        <div id="snippet-list" class="snippet-list"></div>
      </div>
    </div>
  </section>

  <!-- ── Tab 2: Email Validator ── -->
  <section id="tab-email" class="tab-panel">
    <div class="tab-header">
      <span class="tab-header-title">Email Validator</span>
      <span class="tab-stat" id="stat-email" title="Emails validated today">0</span>
      <button class="btn-icon btn-clear-history" data-category="email_validation" title="Clear history">&#128465;</button>
    </div>
    <div class="panel-body">
      <!-- Mode toggle -->
      <div class="mode-toggle-wrap">
        <button class="mode-toggle-btn active" data-mode="single">Single</button>
        <button class="mode-toggle-btn" data-mode="bulk">Bulk</button>
      </div>

      <!-- Single mode -->
      <div id="email-single-mode">
        <div class="form-group">
          <label for="validate-email-input">Email address</label>
          <input id="validate-email-input" type="email" placeholder="user@example.com">
        </div>
        <button class="btn btn-primary btn-block" id="btn-validate-email">Validate</button>
        <div id="email-result" class="result-card hidden"></div>
      </div>

      <!-- Bulk mode -->
      <div id="email-bulk-mode" class="hidden">
        <div class="form-group">
          <label for="bulk-email-input">Emails (one per line)</label>
          <textarea id="bulk-email-input" rows="6" placeholder="user1@example.com&#10;user2@example.com&#10;user3@example.com"></textarea>
        </div>
        <button class="btn btn-primary btn-block" id="btn-validate-bulk">Validate All</button>
        <div id="bulk-progress" class="bulk-progress hidden">
          <div class="bulk-progress-bar"><div class="bulk-progress-fill" id="bulk-progress-fill"></div></div>
          <span class="bulk-progress-text" id="bulk-progress-text">0/0</span>
        </div>
        <div id="bulk-results-controls" class="bulk-controls hidden">
          <label class="toggle-filter">
            <input type="checkbox" id="bulk-filter-valid"> Show valid only
          </label>
          <button class="btn btn-sm btn-outline" id="btn-copy-bulk">Copy Results</button>
        </div>
        <div id="bulk-results" class="bulk-results hidden"></div>
      </div>
    </div>
    <div class="history-section hidden" id="history-email_validation"></div>
  </section>

  <!-- ── Tab 3: AI Generator ── -->
  <section id="tab-ai" class="tab-panel">
    <div class="tab-header">
      <span class="tab-header-title">AI Generator</span>
      <span class="tab-stat" id="stat-ai" title="AI generations today">0</span>
      <button class="btn-icon btn-clear-history" data-category="ai_generation" title="Clear history">&#128465;</button>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label for="ai-content">Content</label>
        <textarea id="ai-content" rows="4" placeholder="Paste or type content, or select text on the page..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group flex-1">
          <label for="ai-category">Category</label>
          <select id="ai-category"><option value="">All</option></select>
        </div>
        <div class="form-group flex-1">
          <label for="ai-prompt">Prompt</label>
          <select id="ai-prompt"><option value="">Select prompt</option></select>
        </div>
      </div>
      <button class="btn btn-primary btn-block" id="btn-generate">Generate</button>
      <div id="ai-result" class="result-card hidden">
        <div id="ai-result-text"></div>
        <div class="result-actions">
          <button class="btn btn-sm btn-outline copy-btn" id="btn-copy-ai">Copy</button>
          <button class="btn btn-sm btn-outline" id="btn-gmail-compose">&#9993; Compose in Gmail</button>
        </div>
      </div>
    </div>
    <div class="history-section hidden" id="history-ai_generation"></div>
  </section>

  <!-- ── Tab 4: WhatsApp Send ── -->
  <section id="tab-whatsapp" class="tab-panel">
    <div class="tab-header">
      <span class="tab-header-title">WhatsApp Send</span>
      <span class="tab-stat" id="stat-wa" title="Messages sent today">0</span>
      <button class="btn-icon btn-clear-history" data-category="whatsapp" title="Clear history">&#128465;</button>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label for="wa-phone">Phone number (with country code)</label>
        <input id="wa-phone" type="tel" placeholder="+919876543210">
      </div>
      <div class="form-group">
        <label for="wa-message">Message</label>
        <textarea id="wa-message" rows="4" placeholder="Type your message..."></textarea>
      </div>
      <div class="form-row">
        <button class="btn btn-outline flex-1" id="btn-wa-use-ai">Use AI</button>
        <button class="btn btn-primary flex-1" id="btn-wa-send">Send</button>
      </div>
      <div id="wa-preview" class="wa-preview hidden">
        <div class="wa-preview-label">Preview</div>
        <div id="wa-preview-text" class="wa-bubble"></div>
      </div>
      <div id="wa-result" class="result-card hidden"></div>
    </div>
    <div class="history-section hidden" id="history-whatsapp"></div>
  </section>

  <!-- ── Tab 5: Upwork Proposal Writer ── -->
  <section id="tab-proposal" class="tab-panel">
    <div class="tab-header">
      <span class="tab-header-title">Proposal Writer</span>
      <span class="tab-stat" id="stat-proposal" title="Proposals generated today">0</span>
      <button class="btn-icon btn-clear-history" data-category="proposal" title="Clear history">&#128465;</button>
    </div>
    <div class="panel-body">
      <div id="proposal-detect" class="proposal-detect">
        <button class="btn btn-primary btn-block" id="btn-detect-job">Detect Upwork Job</button>
        <p class="hint-text" id="proposal-hint">Navigate to an Upwork job posting, then click detect.</p>
      </div>
      <div id="proposal-job-info" class="hidden">
        <div class="job-info-card">
          <div class="job-info-title" id="proposal-job-title"></div>
          <div class="job-info-meta">
            <span class="job-info-budget" id="proposal-job-budget"></span>
            <span class="job-info-skills" id="proposal-job-skills"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="proposal-job-desc">Job Description</label>
          <textarea id="proposal-job-desc" rows="4" placeholder="Job description will be auto-filled..."></textarea>
        </div>
        <div class="form-group">
          <label for="proposal-tone">Tone</label>
          <select id="proposal-tone">
            <option value="professional">Professional</option>
            <option value="friendly">Friendly</option>
            <option value="confident">Confident</option>
            <option value="concise">Concise & Direct</option>
          </select>
        </div>
        <div class="form-group">
          <label for="proposal-highlights">Your Key Skills / Highlights (optional)</label>
          <textarea id="proposal-highlights" rows="2" placeholder="e.g., 5 years React experience, built 20+ apps..."></textarea>
        </div>
        <div class="form-row">
          <button class="btn btn-primary flex-1" id="btn-generate-proposal">Write Proposal</button>
          <button class="btn btn-outline flex-1" id="btn-clear-proposal">Clear</button>
        </div>
      </div>
      <div id="proposal-result" class="result-card hidden">
        <div id="proposal-result-text"></div>
        <div class="result-actions">
          <button class="btn btn-sm btn-outline copy-btn" id="btn-copy-proposal">Copy</button>
          <button class="btn btn-sm btn-outline" id="btn-refine-proposal">Refine</button>
        </div>
      </div>
    </div>
    <div class="history-section hidden" id="history-proposal"></div>
  </section>

  <!-- ── Settings ── -->
  <section id="tab-settings" class="tab-panel">
    <div class="tab-header">
      <span class="tab-header-title">Settings</span>
    </div>
    <div class="panel-body">
      <div class="settings-user" id="settings-user"></div>
      <hr>
      <button class="btn btn-danger btn-block" id="btn-logout">Logout</button>
    </div>
  </section>

  <!-- Bottom tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="swipe">
      <span class="tab-icon">&#128203;</span>
      <span class="tab-label">Swipes</span>
      <span class="tab-badge hidden" id="badge-swipe"></span>
    </button>
    <button class="tab-btn" data-tab="email">
      <span class="tab-icon">&#9993;</span>
      <span class="tab-label">Email</span>
      <span class="tab-badge hidden" id="badge-email"></span>
    </button>
    <button class="tab-btn" data-tab="ai">
      <span class="tab-icon">&#10024;</span>
      <span class="tab-label">AI</span>
      <span class="tab-badge hidden" id="badge-ai"></span>
    </button>
    <button class="tab-btn" data-tab="whatsapp">
      <span class="tab-icon">&#128172;</span>
      <span class="tab-label">WA</span>
      <span class="tab-badge hidden" id="badge-wa"></span>
    </button>
    <button class="tab-btn" data-tab="proposal">
      <span class="tab-icon">&#128221;</span>
      <span class="tab-label">Proposal</span>
      <span class="tab-badge hidden" id="badge-proposal"></span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <span class="tab-icon">&#9881;</span>
      <span class="tab-label">Settings</span>
    </button>
  </nav>
</div>

<!-- ───────── Snippet Modal ───────── -->
<div id="snippet-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="snippet-modal-title">New Snippet</h3>
      <button class="btn-icon modal-close" id="snippet-modal-close">&times;</button>
    </div>
    <form id="snippet-form">
      <div class="form-group">
        <label for="snippet-title-input">Title</label>
        <input id="snippet-title-input" type="text" required>
      </div>
      <div class="form-group">
        <label for="snippet-content-input">Content</label>
        <textarea id="snippet-content-input" rows="5" required></textarea>
      </div>
      <div class="form-group">
        <label for="snippet-folder-input">Folder</label>
        <select id="snippet-folder-input" required></select>
      </div>
      <div class="form-group">
        <label>Tags</label>
        <div id="snippet-tags-input" class="tag-checkboxes"></div>
      </div>
      <input type="hidden" id="snippet-edit-id">
      <div class="form-row">
        <button type="submit" class="btn btn-primary flex-1">Save</button>
        <button type="button" class="btn btn-outline flex-1" id="snippet-modal-cancel">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- ───────── Folder Modal ───────── -->
<div id="folder-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="folder-modal-title">New Folder</h3>
      <button class="btn-icon modal-close" id="folder-modal-close">&times;</button>
    </div>
    <form id="folder-form">
      <div class="form-group">
        <label for="folder-name-input">Name</label>
        <input id="folder-name-input" type="text" required>
      </div>
      <div class="form-group">
        <label for="folder-parent-input">Parent Folder</label>
        <select id="folder-parent-input"><option value="">None (root)</option></select>
      </div>
      <input type="hidden" id="folder-edit-id">
      <div class="form-row">
        <button type="submit" class="btn btn-primary flex-1">Save</button>
        <button type="button" class="btn btn-outline flex-1" id="folder-modal-cancel">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- ───────── Toast ───────── -->
<div id="toast" class="toast hidden"></div>

<script src="popup.js"></script>
</body>
</html>
