version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: swipetoolkit_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-swipetoolkit}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - swipetoolkit

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swipetoolkit_api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-swipetoolkit}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@swipetoolkit.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { if (r.statusCode !== 200) throw new Error(); })"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - swipetoolkit

volumes:
  postgres_data:
  uploads_data:

networks:
  swipetoolkit:
    driver: bridge
